<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>TAD Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            cursor: none;
        }
        #video-player {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            background: #000;
            z-index: 1;
        }
        #waiting-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 2;
        }
        #waiting-screen.hidden { display: none; }
    </style>
</head>
<body>
    <!-- Video Player (fullscreen) -->
    <video id="video-player" muted autoplay></video>

    <!-- Waiting Screen: pure black, no branding visible to passengers -->
    <div id="waiting-screen">
        <!-- Intentionally blank -->
    </div>

    <script>
        // ============================================
        // TAD MINIMAL PLAYER — Zero Dependencies
        // ============================================
        (function() {
            var SERVER = 'http://10.0.0.112:3000';
            var SYNC_INTERVAL = 30000; // 30 seconds
            var deviceId = '';
            var playlist = [];
            var currentIndex = 0;
            var video = document.getElementById('video-player');
            var waitingScreen = document.getElementById('waiting-screen');
            var nodeIdEl = document.getElementById('node-id');

            // 1. Get Device ID from URL or generate one
            function getDeviceId() {
                var params = new URLSearchParams(window.location.search);
                var id = params.get('deviceId') || params.get('node') || params.get('id');
                if (id) {
                    localStorage.setItem('tad_device_id', id);
                    return id;
                }
                var saved = localStorage.getItem('tad_device_id');
                if (saved) return saved;
                var newId = 'TAD-' + Math.random().toString(36).substr(2, 8).toUpperCase();
                localStorage.setItem('tad_device_id', newId);
                return newId;
            }

            // 2. Register device with backend
            function register() {
                fetch(SERVER + '/api/device/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device_id: deviceId, app_version: 'v3.0-minimal' })
                }).then(function() {
                    console.log('[TAD] Registered:', deviceId);
                    updateStatus('REGISTRADO');
                }).catch(function(e) {
                    console.warn('[TAD] Register failed:', e.message);
                    updateStatus('MODO LOCAL');
                });
            }

            // 3. Sync with backend to get playlist
            function sync() {
                updateStatus('SINCRONIZANDO...');
                fetch(SERVER + '/api/device/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        deviceId: deviceId,
                        lastHash: localStorage.getItem('tad_sync_hash') || '',
                        batteryLevel: 100
                    })
                }).then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.blocked) {
                        updateStatus('BLOQUEADO: ' + (data.reason || ''));
                        return;
                    }
                    if (data.media_assets && data.media_assets.length > 0) {
                        playlist = data.media_assets;
                        localStorage.setItem('tad_sync_hash', data.sync_hash || '');
                        console.log('[TAD] Playlist:', playlist.length, 'videos');
                        updateStatus('CONTENIDO RECIBIDO: ' + playlist.length + ' VIDEOS');
                        startPlayback();
                    } else if (data.update === false) {
                        console.log('[TAD] No changes');
                        updateStatus('SIN CAMBIOS - ESPERANDO CONTENIDO');
                        if (playlist.length > 0) startPlayback();
                    } else {
                        console.log('[TAD] No content assigned');
                        updateStatus('SIN CONTENIDO ASIGNADO');
                        showWaiting();
                    }
                }).catch(function(e) {
                    console.error('[TAD] Sync error:', e.message);
                    updateStatus('ERROR DE SYNC - REINTENTANDO');
                });
            }

            // 4. Start video playback
            function startPlayback() {
                if (playlist.length === 0) {
                    showWaiting();
                    return;
                }
                waitingScreen.classList.add('hidden');
                playNext();
            }

            function playNext() {
                if (playlist.length === 0) return;
                var media = playlist[currentIndex];
                var url = media.url || media.src;
                console.log('[TAD] Playing:', url);
                video.src = url;
                video.load();
                video.play().catch(function(e) {
                    console.error('[TAD] Play error:', e.message);
                    // Skip to next after 3 seconds
                    setTimeout(function() {
                        currentIndex = (currentIndex + 1) % playlist.length;
                        playNext();
                    }, 3000);
                });
            }

            // Video ended -> play next
            video.addEventListener('ended', function() {
                console.log('[TAD] Video ended, next...');
                currentIndex = (currentIndex + 1) % playlist.length;
                playNext();
            });

            video.addEventListener('error', function() {
                console.error('[TAD] Video error, skipping...');
                setTimeout(function() {
                    currentIndex = (currentIndex + 1) % playlist.length;
                    playNext();
                }, 3000);
            });

            // 5. Show waiting screen
            function showWaiting() {
                waitingScreen.classList.remove('hidden');
            }

            // 6. Update status text
            function updateStatus(text) {
                var el = document.querySelector('.status');
                if (el) el.innerHTML = '<span class="dot"></span> ' + text;
            }

            // 7. Heartbeat
            function heartbeat() {
                fetch(SERVER + '/api/device/heartbeat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        device_id: deviceId,
                        player_status: playlist.length > 0 ? 'playing' : 'idle',
                        battery_level: 100,
                        storage_free: 'N/A'
                    })
                }).catch(function() {});
            }

            // ============================================
            // INIT
            // ============================================
            deviceId = getDeviceId();
            nodeIdEl.textContent = deviceId;
            console.log('[TAD] Player v3.0 Minimal — Device:', deviceId);
            console.log('[TAD] Server:', SERVER);

            register();
            setTimeout(sync, 1000);

            // Periodic sync
            setInterval(sync, SYNC_INTERVAL);
            // Periodic heartbeat
            setInterval(heartbeat, 60000);
        })();
    </script>
<script>
// ============================================
// TAD SYNC V5 — OFFLINE SYNC MANAGER
// ============================================
const CACHE_NAME = 'tad-media-v5';

class OfflineSyncManager {
  static async synchronize(deviceId) {
    try {
      console.log(`[TAD Sync] Iniciando sincronización para dispositivo: ${deviceId}`);
      
      const SERVER_URL = localStorage.getItem('tad_server_url') || 'https://api.tad.com.do';
      const response = await fetch(`${SERVER_URL}/api/sync/${deviceId}`);
      
      if (!response.ok) {
        if (response.status === 402) console.error('[TAD Sync] ⛔ Suscripción no pagada (Error 402).');
        if (response.status === 403) console.error('[TAD Sync] ⛔ Dispositivo Inactivo (Error 403).');
        return false;
      }
      
      const manifest = await response.json();
      const serverPlaylist = manifest.playlist;
      const serverUrls = serverPlaylist.map(item => item.url);

      const cache = await caches.open(CACHE_NAME);
      const cachedRequests = await cache.keys();
      const cachedUrls = cachedRequests.map(req => req.url);

      let hasChanges = false;

      for (const item of serverPlaylist) {
        if (!cachedUrls.includes(item.url)) {
          console.log(`[TAD Sync] ⬇️ Descargando nuevo medio: ${item.campaignId}`);
          try {
            await cache.add(item.url);
            hasChanges = true;
          } catch (err) {
            console.error(`[TAD Sync] Error descargando ${item.url}:`, err);
          }
        }
      }

      for (const cachedReq of cachedRequests) {
        if (!serverUrls.includes(cachedReq.url)) {
          console.log(`[TAD Sync] 🗑️ Eliminando medio obsoleto: ${cachedReq.url}`);
          await cache.delete(cachedReq);
          hasChanges = true;
        }
      }

      localStorage.setItem('tad_active_playlist', JSON.stringify(serverPlaylist));
      localStorage.setItem('tad_last_sync', new Date().toISOString());

      console.log(`[TAD Sync] ✅ Sincronización completada. Total videos activos: ${serverPlaylist.length}`);
      return hasChanges;

    } catch (error) {
      console.error('[TAD Sync] ❌ Fallo crítico en sincronización:', error);
      return false;
    }
  }
}

window.OfflineSyncManager = OfflineSyncManager;
</script>
</body>
</html>
