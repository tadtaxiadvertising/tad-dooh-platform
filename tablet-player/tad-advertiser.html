<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<title>TAD Advertiser Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --y:#FFD400;--yg:rgba(255,212,0,.2);
  --bg:#09090b;--s1:#111317;--s2:#1a1c23;--s3:#22252e;
  --b:rgba(255,255,255,.05);--b2:rgba(255,255,255,.1);
  --t:#fff;--t2:#94a3b8;--t3:#64748b;
  --green:#10B981;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
body{width:100%;min-height:100dvh;background:var(--bg);color:var(--t);font-family:'Inter',sans-serif}

/* ── AUTH ── */
#auth-wall{position:fixed;inset:0;z-index:900;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;transition:opacity .5s}
#auth-wall.hidden{opacity:0;pointer-events:none}
.auth-box{width:100%;max-width:400px;background:var(--s1);border:1px solid var(--b2);border-radius:24px;padding:32px 24px;box-shadow:0 20px 40px rgba(0,0,0,.6)}
.auth-logo{width:56px;height:56px;background:var(--y);border-radius:16px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;color:#000;margin:0 auto 20px;box-shadow:0 0 30px var(--yg)}
.auth-title{font-size:20px;font-weight:900;text-align:center;letter-spacing:-.5px}
.auth-sub{font-size:13px;color:var(--t2);text-align:center;margin-top:6px;margin-bottom:24px}
.auth-tabs{display:flex;background:var(--s2);border-radius:14px;padding:4px;margin-bottom:24px}
.auth-tab{flex:1;padding:12px;text-align:center;font-size:12px;font-weight:700;color:var(--t3);border-radius:10px;cursor:pointer;text-transform:uppercase}
.auth-tab.active{background:var(--s3);color:#fff}
.auth-form{display:none;flex-direction:column;gap:14px}
.auth-form.active{display:flex}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase}
.field input{background:var(--s2);border:1px solid var(--b2);border-radius:12px;padding:14px;color:var(--t);font-size:14px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--y)}
.btn{width:100%;padding:15px;border-radius:12px;border:none;font-weight:800;text-transform:uppercase;cursor:pointer;background:var(--y);color:#000;box-shadow:0 8px 20px var(--yg);transition:transform .1s}
.btn:active{transform:scale(.97)}

/* ── DASHBOARD ── */
.app{display:flex;flex-direction:column;min-height:100dvh;padding-top:70px}
.topbar{position:fixed;top:0;left:0;right:0;height:70px;background:rgba(9,9,11,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:50}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:32px;height:32px;background:var(--y);border-radius:10px;color:#000;display:flex;align-items:center;justify-content:center;font-weight:900}
.title{font-weight:800;font-size:16px}
.logout-btn{background:var(--s2);border:1px solid var(--b2);color:var(--t);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer}

.container{max-width:1000px;margin:0 auto;padding:24px;width:100%}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.card{background:linear-gradient(145deg,var(--s1),var(--s3));border:1px solid var(--b2);border-radius:20px;padding:24px}
.c-lbl{font-size:11px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.c-val{font-size:36px;font-weight:900;color:var(--y);margin-top:8px}

.sec{font-size:14px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;border-bottom:1px solid var(--b);padding-bottom:12px}
.camp-list{display:flex;flex-direction:column;gap:12px}
.camp-item{background:var(--s2);border:1px solid var(--b);border-radius:16px;padding:20px;display:flex;align-items:center;justify-content:space-between}
.ci-name{font-weight:800;font-size:16px}
.ci-sub{font-size:12px;color:var(--t3);margin-top:4px}
.ci-stats{display:flex;gap:24px}
.ci-stat{text-align:right}
.ci-stat-l{font-size:10px;color:var(--t3);text-transform:uppercase;font-weight:700}
.ci-stat-v{font-size:15px;font-weight:800;color:#fff}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--s3);color:#fff;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;border:1px solid var(--b2)}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<div id="auth-wall">
  <div class="auth-box">
    <div class="auth-logo">T</div>
    <div class="auth-title">Advertiser Portal</div>
    <div class="auth-sub">Gestiona tus campañas y monitorea resultados</div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="tab('login')">Ingresar</div>
      <div class="auth-tab" id="tab-register" onclick="tab('register')">Nuevo Anunciante</div>
    </div>

    <form id="f-login" class="auth-form active" onsubmit="auth(event,'login')">
      <div class="field"><label>Correo Electrónico</label><input type="email" id="l-email" required></div>
      <div class="field"><label>Contraseña</label><input type="password" id="l-pass" required></div>
      <button class="btn" type="submit" id="b-login" style="margin-top:8px">Entrar al panel</button>
    </form>

    <form id="f-register" class="auth-form" onsubmit="auth(event,'register')">
      <div class="field"><label>Nombre de la Empresa</label><input type="text" id="r-company" required></div>
      <div class="field"><label>Nombre del Contacto</label><input type="text" id="r-contact" required></div>
      <div class="field"><label>Correo Electrónico</label><input type="email" id="r-email" required></div>
      <div class="field"><label>Contraseña</label><input type="password" id="r-pass" required minlength="6"></div>
      <button class="btn" type="submit" id="b-register" style="margin-top:8px">Crear Cuenta</button>
    </form>
  </div>
</div>

<div class="app" style="display:none" id="app">
  <div class="topbar">
    <div class="brand">
      <div class="logo">T</div>
      <div class="title" id="t-company">Mi Marca</div>
    </div>
    <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
  </div>

  <div class="container">
    <div class="grid">
      <div class="card">
        <div class="c-lbl">Impresiones (Vistas)</div>
        <div class="c-val" id="d-imps">0</div>
      </div>
      <div class="card">
        <div class="c-lbl">Escaneos QR</div>
        <div class="c-val" id="d-scans" style="color:var(--green)">0</div>
      </div>
      <div class="card">
        <div class="c-lbl">Campañas Activas</div>
        <div class="c-val" id="d-camps" style="color:#fff">0</div>
      </div>
    </div>

    <div class="sec">Mis Campañas</div>
    <div class="camp-list" id="camp-list">
      <!-- Injected -->
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = 'https://proyecto-ia-tad-api.rewvid.easypanel.host/api';
let JWT = localStorage.getItem('adv_token');
let ADV = localStorage.getItem('adv_id');

function tst(m){
  const el=document.getElementById('toast');
  el.textContent=m;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

function tab(t){
  document.getElementById('tab-login').className='auth-tab '+(t==='login'?'active':'');
  document.getElementById('tab-register').className='auth-tab '+(t==='register'?'active':'');
  document.getElementById('f-login').className='auth-form '+(t==='login'?'active':'');
  document.getElementById('f-register').className='auth-form '+(t==='register'?'active':'');
}

async function auth(e,type){
  e.preventDefault();
  const btn = document.getElementById('b-'+type);
  btn.textContent='...';
  
  try{
    let res;
    if(type==='login'){
      res=await fetch(`${API}/advertisers/login`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email:document.getElementById('l-email').value,password:document.getElementById('l-pass').value})
      });
    }else{
      // Create account
      const companyName=document.getElementById('r-company').value, contactName=document.getElementById('r-contact').value, email=document.getElementById('r-email').value, password=document.getElementById('r-pass').value;
      await fetch(`${API}/advertisers`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({companyName,contactName,email,password})
      });
      res=await fetch(`${API}/advertisers/login`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email,password})
      });
    }

    if(!res.ok){ const err = await res.json(); throw new Error(err.message||'Error auth'); }
    
    const d=await res.json();
    JWT=d.access_token; ADV=d.advertiserId;
    localStorage.setItem('adv_token',JWT); localStorage.setItem('adv_id',ADV);
    init();
  }catch(err){
    tst(err.message);
  }
  btn.textContent=type==='login'?'Entrar al panel':'Crear Cuenta';
}

function logout(){
  localStorage.removeItem('adv_token'); localStorage.removeItem('adv_id');
  JWT=null; ADV=null;
  document.getElementById('auth-wall').classList.remove('hidden');
  document.getElementById('app').style.display='none';
}

async function init(){
  if(!JWT || !ADV) return;
  document.getElementById('auth-wall').classList.add('hidden');
  document.getElementById('app').style.display='flex';
  
  try{
    const res = await fetch(`${API}/advertisers/${ADV}/portal`);
    if(!res.ok) throw new Error('Refresh token');
    const data = await res.json();
    
    document.getElementById('t-company').textContent = data.brand.name;
    document.getElementById('d-imps').textContent = (data.stats.totalImpressions||0).toLocaleString();
    document.getElementById('d-scans').textContent = (data.stats.totalScans||0).toLocaleString();
    document.getElementById('d-camps').textContent = data.stats.activeCampaigns||0;

    const cl = document.getElementById('camp-list');
    if(!data.campaigns.length){
      cl.innerHTML = '<div style="color:var(--t3);text-align:center;padding:20px">No hay campañas activas</div>';
    } else {
      cl.innerHTML = data.campaigns.map(c => `
        <div class="camp-item">
          <div>
            <div class="ci-name">${c.name}</div>
            <div class="ci-sub">${new Date(c.start).toLocaleDateString()} a ${new Date(c.end).toLocaleDateString()}</div>
          </div>
          <div class="ci-stats">
            <div class="ci-stat"><div class="ci-stat-l">Status</div><div class="ci-stat-v" style="color:var(--green)">${c.status}</div></div>
            <div class="ci-stat"><div class="ci-stat-l">Impresiones</div><div class="ci-stat-v">${c.impressions.toLocaleString()}</div></div>
          </div>
        </div>
      `).join('');
    }
  }catch(e){
    logout();
  }
}

init();
</script>
</body>
</html>
