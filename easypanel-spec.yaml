# easypanel-spec.yaml (Reference for Antigravity)
# TAD DOOH PLATFORM - CONFIGURACIÓN DE ASFIXIA EN EASYPANEL
services:
  tad-api:
    image: node:20-alpine
    deploy:
      resources:
        limits:
          memory: 1024M
    env:
      - NODE_OPTIONS="--max-old-space-size=800"
      - DATABASE_URL="postgresql://...:6543/postgres?connection_limit=5" # REGLA SRE: Forzar Pooler de Supabase (Puerto 6543)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 150s
