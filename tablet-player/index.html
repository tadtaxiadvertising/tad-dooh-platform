<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-TileColor" content="#000000">
    <link rel="apple-touch-icon" href="icon-512.png">
    
    <!-- Security: Permissive for local dev, restrict in production -->
    <meta http-equiv="Content-Security-Policy" content="default-src * 'self' data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://vercel.live https://browser.sentry-cdn.com https://js.sentry-cdn.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; media-src * blob: data:; connect-src *; img-src * data: blob:;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    
    <title>TAD Player - Taxi Advertising</title>
    
    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (Local) -->
    <script src="./tailwind.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Outfit', 'sans-serif'],
            },
            colors: {
              taxi: {
                400: '#FFD400',
                500: '#FFC000',
                600: '#eab308',
              }
            }
          }
        }
      }
    </script>
    <script src="./qrcode.min.js"></script>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.webmanifest">

    <!-- 🛡️ SENTRY & RESILIENCE PACKAGE (SANTIAGO) -->
    <script src="https://browser.sentry-cdn.com/8.0.0/bundle.min.js" crossorigin="anonymous"></script>
    <script>
      (function() {
        const DSN = "https://b786a0fa94eec198afb9e35ce84d16ea@o4511114332143616.ingest.us.sentry.io/4511114334633984";
        if (typeof Sentry !== 'undefined') {
          Sentry.init({
            dsn: DSN,
            integrations: [],
            tracesSampleRate: 0,
            replaysSessionSampleRate: 0,
            replaysOnErrorSampleRate: 0,
            ignoreErrors: [
              'AbortError',
              'The play() request was interrupted',
              'NotAllowedError',
              'Failed to fetch',
              'NetworkError',
            ],
            initialScope: {
              tags: { 
                "app": "tad-player-v2", 
                "region": "santiago",
                "env": "production" 
              }
            }
          });
          console.log("🛡️ Sentry Active (Santiago Resilience Mode)");
        }
      })();
    </script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: #000;
        }
        
        h1, h2, h3, .font-display { font-family: 'Outfit', sans-serif; }
        #video-container { background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .kiosk-mode { cursor: none; }
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #FFD400;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px currentColor; }
        .status-online { color: #22c55e; background: currentColor; }
        .status-offline { color: #ef4444; background: currentColor; }
        .status-sync { color: #eab308; background: currentColor; }
    </style>
</head>
<body class="bg-black text-white kiosk-mode">
    
    <div id="app" class="min-h-screen flex flex-col">
        <header id="header" class="hidden bg-zinc-900 border-b border-zinc-800 p-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <h1 class="text-xl font-bold text-taxi-400">TAD Player</h1>
                    <span id="status-indicator" class="status-dot status-offline"></span>
                    <span id="status-text" class="text-sm text-gray-400">Offline</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="device-id" class="text-sm text-gray-400">--</span>
                    <span id="time" class="text-sm text-gray-400">--:--</span>
                </div>
            </div>
        </header>
        
        <main id="video-container" class="flex-1 flex items-center justify-center relative">
            <video id="main-video" class="w-full h-full" preload="auto" muted autoplay loop></video>
            
            <div id="loading-state" class="absolute inset-0 flex items-center justify-center bg-black">
                <div class="text-center">
                    <div class="loader mx-auto mb-4"></div>
                    <p class="text-gray-400">Cargando contenido...</p>
                </div>
            </div>
            
            <div id="error-state" class="hidden absolute inset-0 flex items-center justify-center bg-black">
                <div class="text-center max-w-md px-4">
                    <h2 class="text-xl font-bold mb-2">Error de Reproducción</h2>
                    <p id="error-message" class="text-gray-400 mb-4">Contenido no disponible</p>
                    <button onclick="player.retry()" class="bg-taxi-500 hover:bg-taxi-600 text-white font-bold py-2 px-6 rounded-full">Reintentar</button>
                </div>
            </div>
            
            <div id="no-content-state" class="hidden absolute inset-0 bg-black"></div>
            
            <div id="blocked-state" class="hidden absolute inset-0 flex items-center justify-center bg-black">
                <div class="text-center max-w-lg px-6">
                    <h2 class="text-2xl font-bold mb-3 text-yellow-400">Cuenta Suspendida</h2>
                    <p id="blocked-reason" class="text-gray-400 text-lg mb-4">Suscripción vencida.</p>
                    <p class="text-gray-600 text-xs mt-4">ID: <span id="blocked-device-id">--</span></p>
                </div>
            </div>
        </main>
        
        <footer id="footer" class="hidden bg-zinc-900 border-t border-zinc-800 p-4">
            <div class="flex items-center justify-between text-sm text-gray-400">
                <div class="flex items-center space-x-4">
                    <span id="current-campaign">--</span>
                    <span id="playlist-position">--/--</span>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="player.restart()" class="hover:text-white">Restart</button>
                </div>
            </div>
        </footer>
    </div>
    
    <script>
        const CONFIG = {
            SERVER_URL: localStorage.getItem('tad_server_url') || 'https://proyecto-ia-tad-api.rewvid.easypanel.host',
            DEVICE_ID_KEY: 'tad_device_id',
            AUTH_TOKEN_KEY: 'tad_auth_token',
            ANALYTICS_BATCH_SIZE: 100,
            STORAGE_EVENTS: 'tad_events'
        };

        const LEGACY_IDS_TO_PURGE = ['taxi-9wu77o406', 'taxi-at23izb1d', 'Mendy'];

        var state = {
            deviceId: null,
            isOnline: navigator.onLine,
            isSyncing: false,
            currentPlaylist: [],
            currentIndex: 0,
            lastSyncHash: null
        };

        var storage = {
            async init() {
                const urlParams = new URLSearchParams(window.location.search);
                let id = urlParams.get('deviceId') || urlParams.get('device_id') || localStorage.getItem(CONFIG.DEVICE_ID_KEY);
                
                if (id && LEGACY_IDS_TO_PURGE.includes(id)) id = null;
                if (!id) id = 'TAD-' + Math.random().toString(36).substr(2, 8).toUpperCase();
                
                state.deviceId = id;
                localStorage.setItem(CONFIG.DEVICE_ID_KEY, id);
                state.lastSyncHash = localStorage.getItem('tad_last_sync_hash');
                
                console.log('🔑 Device ID:', state.deviceId);
            },
            async getEvents() { return JSON.parse(localStorage.getItem(CONFIG.STORAGE_EVENTS) || '[]'); },
            async saveEvents(evs) {
                const existing = await this.getEvents();
                localStorage.setItem(CONFIG.STORAGE_EVENTS, JSON.stringify([...existing, ...evs]));
            },
            async clearEvents(ids) {
                const existing = await this.getEvents();
                localStorage.setItem(CONFIG.STORAGE_EVENTS, JSON.stringify(existing.filter(e => !ids.includes(e.id))));
            }
        };

        var player = {
            video: null,
            init() {
                this.video = document.getElementById('main-video');
                this.video.addEventListener('ended', () => this.next());
                this.video.addEventListener('error', () => this.retry());
                this.video.addEventListener('play', () => ui.hideAllStates());
                this.video.addEventListener('timeupdate', () => ui.updatePlaylistPosition());
            },
            async play(asset) {
                if (!asset || !asset.url) return;
                this.video.src = asset.url;
                try { await this.video.play(); } catch (e) { console.warn('Play failed', e); }
            },
            next() {
                if (!state.currentPlaylist.length) return;
                state.currentIndex = (state.currentIndex + 1) % state.currentPlaylist.length;
                this.play(state.currentPlaylist[state.currentIndex]);
            },
            retry() { setTimeout(() => this.play(state.currentPlaylist[state.currentIndex]), 3000); },
            restart() { location.reload(); }
        };

        var ui = {
            init() {
                this.indicator = document.getElementById('status-indicator');
                this.text = document.getElementById('status-text');
                document.getElementById('device-id').textContent = state.deviceId;
                setInterval(() => this.updateTime(), 60000);
                this.updateTime();
            },
            updateStatus(s) {
                if (!this.indicator) return;
                this.indicator.className = 'status-dot status-' + s;
                this.text.textContent = s === 'online' ? 'En Línea' : s === 'sync' ? 'Sincronizando...' : 'Fuera de Línea';
            },
            updatePlaylistPosition() {
                const el = document.getElementById('playlist-position');
                if (el) el.textContent = `${state.currentIndex + 1}/${state.currentPlaylist.length}`;
            },
            updateTime() {
                const t = document.getElementById('time');
                if (t) {
                    const d = new Date();
                    t.textContent = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
                }
            },
            hideAllStates() {
                ['loading-state', 'error-state', 'no-content-state', 'blocked-state'].forEach(id => document.getElementById(id).classList.add('hidden'));
            }
        };

        var sync = {
            async performSync() {
                if (state.isSyncing || !state.isOnline) return;
                state.isSyncing = true;
                ui.updateStatus('sync');
                try {
                    const res = await fetch(`${CONFIG.SERVER_URL}/api/v1/device/sync`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ deviceId: state.deviceId, lastHash: state.lastSyncHash || '' })
                    });
                    if (res.ok) {
                        const data = await res.json();
                        if (data.update !== false && data.media_assets) {
                            state.currentPlaylist = data.media_assets;
                            state.lastSyncHash = data.sync_hash;
                            localStorage.setItem('tad_last_sync_hash', data.sync_hash);
                            localStorage.setItem('tad_playlist_cache', JSON.stringify({ media_assets: data.media_assets }));
                            player.play(state.currentPlaylist[0]);
                        }
                    }
                } catch (e) { console.warn('Sync failed', e); }
                finally { state.isSyncing = false; ui.updateStatus(state.isOnline ? 'online' : 'offline'); }
            }
        };

        async function boot() {
            await storage.init();
            player.init();
            ui.init();
            
            const cache = JSON.parse(localStorage.getItem('tad_playlist_cache') || '{}');
            if (cache.media_assets) {
                state.currentPlaylist = cache.media_assets;
                player.play(state.currentPlaylist[0]);
            }
            
            sync.performSync();
            setInterval(() => sync.performSync(), 300000);
        }

        window.addEventListener('online', () => { state.isOnline = true; ui.updateStatus('online'); sync.performSync(); });
        window.addEventListener('offline', () => { state.isOnline = false; ui.updateStatus('offline'); });
        
        boot();
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => console.log('SW OK', reg.scope)).catch(err => console.error('SW ERR', err));
            });
        }
    </script>
</body>
</html>
