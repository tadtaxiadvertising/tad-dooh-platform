<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAD Dominicana - Tablet Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 999;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #333;
            border-top: 4px solid #00d4aa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 18px;
            opacity: 0.8;
        }
        
        .device-id {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Cargando TAD Player...</div>
    </div>
    
    <!-- Device ID Display -->
    <div class="device-id">
        📱 taxi-9wu77o406
    </div>
    
    <!-- Video Container -->
    <div class="container">
        <video 
            id="video" 
            autoplay 
            loop 
            muted 
            playsinline
            preload="auto"
        >
            <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4">
            <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4" type="video/mp4">
            Tu navegador no soporta video HTML5.
        </video>
    </div>
    
    <script>
        // Device ID persistente
        const DEVICE_ID = 'taxi-9wu77o406';
        document.querySelector('.device-id').textContent = '📱 ' + DEVICE_ID;
        
        // Video element
        const video = document.getElementById('video');
        const loading = document.getElementById('loading');
        
        // Hide loading when video starts
        video.addEventListener('playing', function() {
            loading.style.display = 'none';
            console.log('▶️ Video playing');
        });
        
        // Error handling
        video.addEventListener('error', function(e) {
            console.error('❌ Video error:', e);
            loading.innerHTML = `
                <div style="color: #ff4444; text-align: center;">
                    <div style="font-size: 48px; margin-bottom: 20px;">⚠️</div>
                    <div>Error cargando video</div>
                    <div style="font-size: 12px; margin-top: 10px; opacity: 0.7;">
                        Verifica conexión a internet
                    </div>
                </div>
            `;
        });
        
        // Log when loaded
        video.addEventListener('loadeddata', function() {
            console.log('✅ Video loaded');
        });
        
        // Force reload every 6 hours (para actualizar contenido)
        setTimeout(function() {
            location.reload();
        }, 6 * 60 * 60 * 1000); // 6 horas
        
        // Console info
        console.log('🚀 TAD Player Simple loaded');
        console.log('📱 Device ID:', DEVICE_ID);
        console.log('🎬 Video:', video.currentSrc);
    </script>
</body>
</html>
