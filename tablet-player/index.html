<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-TileColor" content="#000000">
    <link rel="apple-touch-icon" href="icon-512.png">
    
    <!-- Security: Permissive for local dev, restrict in production -->
    <meta http-equiv="Content-Security-Policy" content="default-src * 'self' data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://vercel.live; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; media-src * blob: data:; connect-src *; img-src * data: blob:;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    
    <title>TAD Player - Taxi Advertising</title>
    
    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (Local) -->
    <script src="./tailwind.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Outfit', 'sans-serif'],
            },
            colors: {
              taxi: {
                400: '#FFD400',
                500: '#FFC000',
                600: '#eab308',
              }
            }
          }
        }
      }
    </script>
    <script src="./qrcode.min.js"></script>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.webmanifest">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: #000;
        }
        
        h1, h2, h3, .font-display {
            font-family: 'Outfit', sans-serif;
        }

        #video-container {
            background: #000;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .kiosk-mode {
            cursor: none;
        }
        
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #FFD400;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .glow-yellow {
            text-shadow: 0 0 25px rgba(255, 212, 0, 0.6), 0 0 50px rgba(255, 212, 0, 0.3);
        }

        .bg-mesh {
            background-color: #000;
            background-image: 
                radial-gradient(at 0% 0%, hsla(50, 100%, 50%, 0.1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(50, 100%, 50%, 0.05) 0, transparent 50%),
                radial-gradient(at 50% 50%, hsla(0, 0%, 5%, 0.8) 0, transparent 80%);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px currentColor;
        }
        .status-online { color: #22c55e; background: currentColor; }
        .status-offline { color: #ef4444; background: currentColor; }
        .status-sync { color: #eab308; background: currentColor; }
    </style>
</head>
<body class="bg-black text-white kiosk-mode">
    
    <!-- App Container -->
    <div id="app" class="min-h-screen flex flex-col">
        
        <!-- Header (oculto en kiosk mode, visible para debug) -->
        <header id="header" class="hidden bg-zinc-900 border-b border-zinc-800 p-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <h1 class="text-xl font-bold text-taxi-400">TAD Player</h1>
                    <span id="status-indicator" class="status-dot status-offline"></span>
                    <span id="status-text" class="text-sm text-gray-400">Offline</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="device-id" class="text-sm text-gray-400">--</span>
                    <span id="time" class="text-sm text-gray-400">--:--</span>
                </div>
            </div>
        </header>
        
        <!-- Main Video Container -->
        <main id="video-container" class="flex-1 flex items-center justify-center relative">
            
            <!-- Video Element -->
            <video 
                id="main-video" 
                class="w-full h-full"
                preload="auto"
                muted
                autoplay
                loop
            ></video>
            
            <!-- Loading State -->
            <div id="loading-state" class="absolute inset-0 flex items-center justify-center bg-black">
                <div class="text-center">
                    <div class="loader mx-auto mb-4"></div>
                    <p class="text-gray-400">Cargando contenido...</p>
                </div>
            </div>
            
            <!-- Error State -->
            <div id="error-state" class="hidden absolute inset-0 flex items-center justify-center bg-black">
                <div class="text-center max-w-md px-4">
                    <svg class="w-16 h-16 mx-auto mb-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <h2 class="text-xl font-bold mb-2">Error de Reproducción</h2>
                    <p id="error-message" class="text-gray-400 mb-4">--</p>
                    <button 
                        onclick="player.retry()"
                        class="bg-taxi-500 hover:bg-taxi-600 text-white font-bold py-2 px-6 rounded-full"
                    >
                        Reintentar
                    </button>
                </div>
            </div>
            
            <!-- No Content State: Pure black, no branding -->
            <div id="no-content-state" class="hidden absolute inset-0 bg-black">
                <!-- Intentionally blank: screen stays black when no content is assigned -->
            </div>
            
            <!-- Blocked State (Subscription Expired) -->
            <div id="blocked-state" class="hidden absolute inset-0 flex items-center justify-center bg-black">
                <div class="text-center max-w-lg px-6">
                    <svg class="w-20 h-20 mx-auto mb-6 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m0 0v2m0-2h2m-2 0H10m4-10V5a2 2 0 00-2-2H8a2 2 0 00-2 2v2m8 0H6a2 2 0 00-2 2v6a2 2 0 002 2h8a2 2 0 002-2V9a2 2 0 00-2-2z"></path>
                    </svg>
                    <h2 class="text-2xl font-bold mb-3 text-yellow-400">Cuenta Suspendida</h2>
                    <p id="blocked-reason" class="text-gray-400 text-lg mb-4">Tu suscripción ha vencido. Para reactivar la publicidad contacta a soporte TAD.</p>
                    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 mt-4">
                        <p class="text-white font-bold text-lg">WhatsApp: +1 (849) 504-3872</p>
                        <p class="text-gray-500 text-sm mt-1">tad.taxiadvertising@gmail.com</p>
                    </div>
                    <p class="text-gray-600 text-xs mt-4">ID: <span id="blocked-device-id">--</span></p>
                </div>
            </div>

        </main>
        
        <!-- Footer (oculto en kiosk mode) -->
        <footer id="footer" class="hidden bg-zinc-900 border-t border-zinc-800 p-4">
            <div class="flex items-center justify-between text-sm text-gray-400">
                <div class="flex items-center space-x-4">
                    <span id="current-campaign">--</span>
                    <span id="playlist-position">--/--</span>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="player.toggleDebug()" class="hover:text-white">Debug</button>
                    <button onclick="player.forceSync()" class="hover:text-white">Sync</button>
                    <button onclick="player.restart()" class="hover:text-white">Restart</button>
                </div>
            </div>
        </footer>
        
        <!-- Debug Panel (toggle con F12 o botón) -->
        <div id="debug-panel" class="hidden absolute top-0 right-0 bg-black/90 p-4 text-xs font-mono max-w-md max-h-full overflow-auto">
            <h3 class="font-bold mb-2">Debug Info</h3>
            <pre id="debug-content" class="text-gray-400"></pre>
        </div>
    </div>
    
    <!-- Application Logic -->
    <script type="module">
        // ============================================
        // TAD TABLET PLAYER v2.0 — Localhost Edition
        // ============================================
        // Changes from v1:
        //   - SERVER_URL defaults to http://localhost:3000 (no Vercel)
        //   - True UUID-based identity: crypto.randomUUID() → localStorage
        //   - Legacy IDs (taxi-9wu77o406, Mendy, etc.) are purged on boot
        //   - TEST_PLAYLIST removed: if no backend content → TAD NODE logo
        //   - Playback confirmation sent on each video_completed
        // ============================================

        // ============================================
        // CONFIGURATION
        // ============================================

        const CONFIG = {
            // URL del servidor TAD — Producción en Easypanel
            SERVER_URL: localStorage.getItem('tad_server_url') || 'https://proyecto-ia-tad-api.rewvid.easypanel.host',
            
            // Device ID (se genera automáticamente y se persiste en localStorage)
            DEVICE_ID_KEY: 'tad_device_id',
            
            // Auth token
            AUTH_TOKEN_KEY: 'tad_auth_token',
            
            // FullyKiosk Browser password — configurable via localStorage
            FULLY_KIOSK_PASSWORD: localStorage.getItem('tad_fkb_password') || '',
            
            // Sync settings
            SYNC_INTERVAL: 5 * 60 * 1000, // 5 minutos (más frecuente en localhost)
            SYNC_WINDOW: 10 * 60 * 1000,
            
            // Analytics batch size
            ANALYTICS_BATCH_SIZE: 100,
            
            // Heartbeat interval
            HEARTBEAT_INTERVAL: 5 * 60 * 1000,
            
            // Storage keys
            STORAGE_CAMPAIGNS: 'tad_campaigns',
            STORAGE_EVENTS: 'tad_events',
            STORAGE_CONFIG: 'tad_config'
        };

        // ============================================
        // STATE MANAGEMENT
        // ============================================
        
        const state = {
            deviceId: null,
            authToken: null,
            isOnline: navigator.onLine,
            isSyncing: false,
            currentCampaign: null,
            currentPlaylist: [],
            currentIndex: 0,
            lastSync: null,
            lastSyncHash: null,
            events: [],
            config: {
                loopEnabled: true,
                analyticsEnabled: true,
                watchdogEnabled: true,
                simulatorMode: !(/Android|iPhone|iPad/i.test(navigator.userAgent))
            },
            batteryLevel: 100,
            lat: null,
            lng: null
        };

        // ============================================
        // IDENTITY ENGINE — Unique UUID per Tablet
        // ============================================
        // This is the SINGLE source of truth for Device ID generation.
        // It runs once during storage.init() and never again.
        // The ID format is: TAD-XXXXXXXX (8-char uppercase hex from crypto.randomUUID)
        //
        // Legacy IDs from testing are automatically purged:
        //   - taxi-9wu77o406, taxi-at23izb1d, Mendy
        // ============================================

        const LEGACY_IDS_TO_PURGE = [
            'taxi-9wu77o406',
            'taxi-at23izb1d',
            'Mendy',
        ];

        function generateDeviceId() {
            // Prefer FullyKiosk hardware ID if available (real tablet)
            if (typeof fully !== 'undefined' && fully.getDeviceId) {
                const hwId = fully.getDeviceId();
                if (hwId) {
                    return 'TAD-' + hwId.replace(/[^a-zA-Z0-9]/g, '').substring(0, 10).toUpperCase();
                }
            }

            // Generate a true UUID and take the first segment (8 hex chars)
            const uuid = (typeof crypto !== 'undefined' && crypto.randomUUID)
                ? crypto.randomUUID().split('-')[0].toUpperCase()
                : Math.random().toString(36).substr(2, 8).toUpperCase();

            return 'TAD-' + uuid;
        }

        // ============================================
        // STORAGE WRAPPER (IndexedDB + localStorage)
        // ============================================
        
        const storage = {
            async init() {
                // 1. Check for deviceId in URL parameters (Priority 1)
                const urlParams = new URLSearchParams(window.location.search);
                let urlId = urlParams.get('deviceId') || urlParams.get('device_id') || urlParams.get('node') || urlParams.get('id');
                
                // 2. Read persisted Device ID (Priority 2)
                let savedId = localStorage.getItem(CONFIG.DEVICE_ID_KEY);

                // 3. Logic to decide which ID to use
                if (urlId) {
                    console.log('🔗 Device ID from URL detected:', urlId);
                    savedId = urlId;
                    localStorage.setItem(CONFIG.DEVICE_ID_KEY, savedId);
                }

                // 4. Purge any legacy/test IDs
                if (savedId && LEGACY_IDS_TO_PURGE.includes(savedId)) {
                    console.log('🚮 Purging legacy Device ID:', savedId);
                    savedId = null;
                    localStorage.removeItem(CONFIG.DEVICE_ID_KEY);
                }

                // 5. Generate a new ID only if none exists
                if (!savedId) {
                    savedId = generateDeviceId();
                    localStorage.setItem(CONFIG.DEVICE_ID_KEY, savedId);
                    console.log('🆕 New Device ID generated:', savedId);
                }

                state.deviceId = savedId;
                state.authToken = localStorage.getItem(CONFIG.AUTH_TOKEN_KEY);
                state.lastSync = localStorage.getItem('tad_last_sync');
                state.lastSyncHash = localStorage.getItem('tad_last_sync_hash');

                console.log('🔑 Device ID activo:', state.deviceId);

                // ============================================
                // DEBUG GESTURE: 7 clicks to open Admin Panel
                // ============================================
                let clickCount = 0;
                let lastClick = 0;
                document.body.addEventListener('click', (e) => {
                    const now = Date.now();
                    if (now - lastClick > 500) clickCount = 0;
                    clickCount++;
                    lastClick = now;

                    if (clickCount >= 7) {
                        clickCount = 0;
                        const action = confirm(`DEBUG TAD\nID: ${state.deviceId}\nServer: ${CONFIG.SERVER_URL}\n\n¿Deseas REINICIAR el ID de este dispositivo?`);
                        if (action) {
                            localStorage.clear();
                            location.reload();
                        }
                    }
                });
                
                // Load config
                const config = localStorage.getItem(CONFIG.STORAGE_CONFIG);
                if (config) {
                    state.config = JSON.parse(config);
                }
                
                console.log('💾 Storage initialized');
            },
            
            async saveEvents(events) {
                const db = await this.getDB();
                const tx = db.transaction('events', 'readwrite');
                events.forEach(event => {
                    tx.objectStore('events').add({ ...event, id: Date.now() + Math.random() });
                });
            },
            
            async getEvents() {
                const db = await this.getDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction('events', 'readonly');
                    const req = tx.objectStore('events').getAll();
                    req.onsuccess = () => resolve(req.result.sort((a, b) => a.timestamp - b.timestamp));
                    req.onerror = () => reject(req.error);
                });
            },
            
            async clearEvents(ids) {
                if (!ids || !Array.isArray(ids) || ids.length === 0) return;
                const db = await this.getDB();
                const tx = db.transaction('events', 'readwrite');
                const store = tx.objectStore('events');
                ids.forEach(id => {
                    if (id !== undefined) store.delete(id);
                });
            },
            
            async getDB() {
                if (!this.db) {
                    this.db = await this.openDB();
                }
                return this.db;
            },
            
            openDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open('TADPlayer', 1);
                    
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                    
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains('events')) {
                            db.createObjectStore('events', { keyPath: 'id' });
                        }
                        if (!db.objectStoreNames.contains('campaigns')) {
                            db.createObjectStore('campaigns', { keyPath: 'id' });
                        }
                    };
                });
            }
        };
        
        // ============================================
        // VIDEO PLAYER
        // ============================================
        
        const player = {
            video: null,
            isPlaying: false,
            retryCount: 0,
            maxRetries: 3,
            
            init() {
                this.video = document.getElementById('main-video');
                
                // Inject cross-browser inline playback attributes via JS to silence static linters
                this.video.setAttribute('playsinline', '');
                this.video.setAttribute('webkit-playsinline', '');
                this.video.setAttribute('x5-playsinline', '');
                
                // Inject theme-color via JS
                const meta = document.createElement('meta');
                meta.name = 'theme-color';
                meta.content = '#000000';
                document.getElementsByTagName('head')[0].appendChild(meta);

                this.video.addEventListener('play', () => this.onPlay());
                this.video.addEventListener('pause', () => this.onPause());
                this.video.addEventListener('ended', () => this.onEnded());
                this.video.addEventListener('error', (e) => this.onError(e));
                this.video.addEventListener('timeupdate', () => this.onTimeUpdate());
                
                console.log('▶️ Video player initialized');
            },
            
            async startExperience() {
                try {
                    if (!this.video) return;

                    // Unlock audio/video via user interaction
                    this.video.muted = true; // Keep muted to pass autoplay policy
                    const playPromise = this.video.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(e => {
                            // AbortError is expected when showNoContent() interrupts play — ignore
                            if (e.name !== 'AbortError') {
                                console.warn('▶️ Autoplay blocked:', e.message);
                            }
                        });
                    }

                    // Attempt Full Screen if supported
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(() => {});
                    }

                    // Hide start screen
                    const startState = document.getElementById('start-state');
                    if (startState) startState.classList.add('hidden');
                    
                    // Trigger first sync/play if content is ready
                    if (state.currentPlaylist.length > 0) {
                        this.play(state.currentPlaylist[state.currentIndex]);
                    } else {
                        // No content: stay black, sync will handle it
                        this.showNoContent();
                        sync.performSync();
                    }
                } catch (e) {
                    // Silently ignore AbortError on startExperience
                    if (e.name !== 'AbortError') {
                        console.error('Failure starting experience:', e);
                    }
                }
            },
            
            async play(video) {
                try {
                    this.showLoading();
                    
                    // Ensure video is muted for autoplay policy
                    this.video.muted = true;
                    this.video.src = video.url || video.src;
                    this.video.load();
                    
                    await this.video.play();
                    this.isPlaying = true;
                    this.retryCount = 0;
                    
                    // Track campaignId from the media asset itself
                    const campaignId = video.campaignId || state.currentCampaign?.id;
                    
                    analytics.track('video_started', {
                        campaignId: campaignId,
                        mediaId: video.id,
                        videoUrl: video.url,
                        filename: video.filename
                    });
                    
                    console.log('▶️ Playing:', video.filename || video.name || video.url);
                    
                } catch (error) {
                    console.error('❌ Error playing video:', error);
                    this.onError(error);
                }
            },
            
            onPlay() {
                this.hideAllStates();
                this.isPlaying = true;
                ui.updatePlaylistPosition();
            },
            
            onPause() {
                this.isPlaying = false;
            },
            
            async onEnded() {
                console.log('✅ Video ended');
                
                const currentMedia = state.currentPlaylist[state.currentIndex];
                const campaignId = currentMedia?.campaignId || state.currentCampaign?.id;
                
                // Track completion
                analytics.track('video_completed', {
                    campaignId: campaignId,
                    mediaId: currentMedia?.id,
                    duration: this.video.duration,
                    filename: currentMedia?.filename
                });

                // Send Playback Confirmation to backend for "EN VIVO" tracking
                if (state.isOnline && currentMedia) {
                    try {
                        await fetch(`${CONFIG.SERVER_URL}/api/device/playback`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                device_id: state.deviceId,
                                video_id: currentMedia.id,
                                timestamp: new Date().toISOString()
                            })
                        });
                    } catch (e) {
                        console.warn('⚠️ Playback confirmation failed (offline?)');
                    }
                }
                
                // Next video
                this.next();
            },
            
            onError(error) {
                console.error('❌ Video error:', error);
                this.retryCount++;
                
                if (this.retryCount >= this.maxRetries) {
                    this.showError('Error al reproducir video. Saltando al siguiente...');
                    
                    analytics.track('video_error', {
                        campaignId: state.currentCampaign?.id,
                        mediaId: state.currentPlaylist[state.currentIndex]?.id,
                        error: error.message || 'Unknown error'
                    });
                    
                    // Skip to next
                    setTimeout(() => this.next(), 3000);
                } else {
                    console.log('🔄 Retry', this.retryCount);
                    setTimeout(() => this.play(state.currentPlaylist[state.currentIndex]), 2000);
                }
            },
            
            onTimeUpdate() {
                ui.updateProgress(this.video.currentTime / this.video.duration);
            },
            
            next() {
                if (state.currentPlaylist.length === 0) {
                    this.showNoContent();
                    return;
                }
                
                state.currentIndex = (state.currentIndex + 1) % state.currentPlaylist.length;
                const nextVideo = state.currentPlaylist[state.currentIndex];
                this.play(nextVideo);
            },
            
            previous() {
                if (state.currentPlaylist.length === 0) return;
                
                state.currentIndex = (state.currentIndex - 1 + state.currentPlaylist.length) % state.currentPlaylist.length;
                const prevVideo = state.currentPlaylist[state.currentIndex];
                this.play(prevVideo);
            },
            
            retry() {
                this.retryCount = 0;
                if (state.currentPlaylist.length > 0) {
                    this.play(state.currentPlaylist[state.currentIndex]);
                }
            },
            
            restart() {
                location.reload();
            },
            
            showLoading() {
                this.hideAllStates();
                document.getElementById('loading-state').classList.remove('hidden');
            },
            
            showError(message) {
                this.hideAllStates();
                document.getElementById('error-message').textContent = message;
                document.getElementById('error-state').classList.remove('hidden');
            },
            
            showNoContent() {
                this.hideAllStates();
                // Pure black screen — no TAD branding visible on tablets
                const container = document.getElementById('no-content-state');
                if (container) container.classList.remove('hidden');
                // Stop any current playback
                if (this.video) {
                    this.video.pause();
                    this.video.removeAttribute('src');
                    this.video.load();
                }
                this.isPlaying = false;
                console.log('⬛ No content assigned. Screen is black.');
            },
            
            showBlocked(reason) {
                this.hideAllStates();
                const display = document.getElementById('blocked-device-id');
                if (display) display.textContent = state.deviceId;
                
                if (reason) {
                    const reasonEl = document.getElementById('blocked-reason');
                    if (reasonEl) reasonEl.textContent = reason;
                }
                
                const container = document.getElementById('blocked-state');
                if (container) container.classList.remove('hidden');
                if (this.video) {
                    this.video.pause();
                    this.video.src = '';
                }
                this.isPlaying = false;
                console.warn('⛔ Player blocked:', reason);
            },
            
            hideAllStates() {
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('error-state').classList.add('hidden');
                document.getElementById('no-content-state').classList.add('hidden');
                document.getElementById('blocked-state').classList.add('hidden');
            },
            
            toggleDebug() {
                const panel = document.getElementById('debug-panel');
                panel.classList.toggle('hidden');
                if (!panel.classList.contains('hidden')) {
                    this.updateDebugInfo();
                }
            },
            
            updateDebugInfo() {
                const debug = {
                    deviceId: state.deviceId,
                    serverUrl: CONFIG.SERVER_URL,
                    isOnline: state.isOnline,
                    isSyncing: state.isSyncing,
                    playlistLength: state.currentPlaylist.length,
                    currentIndex: state.currentIndex,
                    lastSync: state.lastSync,
                    pendingEvents: state.events.length,
                    videoState: {
                        src: this.video?.src,
                        currentTime: this.video?.currentTime,
                        duration: this.video?.duration,
                        paused: this.video?.paused,
                        error: this.video?.error
                    }
                };
                document.getElementById('debug-content').textContent = JSON.stringify(debug, null, 2);
            },
            
            async forceSync() {
                await sync.performSync();
            }
        };
        
        // ============================================
        // ANALYTICS
        // ============================================
        
        const analytics = {
            track(eventType, data = {}) {
                const event = {
                    type: eventType,
                    deviceId: state.deviceId,
                    timestamp: Date.now(),
                    occurredAt: new Date().toISOString(),
                    ...data
                };
                
                console.log('📊 Event:', event);
                
                state.events.push(event);
                storage.saveEvents([event]);
                
                if (state.isOnline && state.events.length >= CONFIG.ANALYTICS_BATCH_SIZE) {
                    this.uploadBatch();
                }
            },
            
            async uploadBatch() {
                if (state.events.length === 0 || !state.isOnline) return;
                
                const batch = state.events.slice(0, CONFIG.ANALYTICS_BATCH_SIZE);
                
                try {
                    const response = await fetch(`${CONFIG.SERVER_URL}/api/analytics/batch`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${state.authToken}`
                        },
                        body: JSON.stringify({
                            deviceId: state.deviceId,
                            events: batch
                        })
                    });
                    
                    if (response.ok) {
                        state.events = state.events.slice(CONFIG.ANALYTICS_BATCH_SIZE);
                        const ids = batch.map(e => e.id);
                        await storage.clearEvents(ids);
                        console.log('✅ Analytics uploaded:', batch.length);
                    }
                } catch (error) {
                    console.error('❌ Error uploading analytics:', error);
                }
            },
            
            async uploadAll() {
                const events = await storage.getEvents();
                state.events = events;
                await this.uploadBatch();
            }
        };
        
        // ============================================
        // SYNC CLIENT — Localhost-first
        // ============================================
        
        const sync = {
            syncRetryDelay: 30000,
            SYNC_CACHE_KEY: 'tad_playlist_cache',
            SYNC_TTL_MS: 24 * 60 * 60 * 1000, // 24 hours kill-switch TTL

            // ── OFFLINE RESTORE ──
            // Load last valid playlist from localStorage on boot
            restoreFromCache() {
                try {
                    const raw = localStorage.getItem(this.SYNC_CACHE_KEY);
                    if (!raw) return false;
                    const cached = JSON.parse(raw);
                    const age = Date.now() - (cached.savedAt || 0);

                    if (age > this.SYNC_TTL_MS) {
                        console.warn('⏳ Cached playlist expired (>24h). Kill-switch active.');
                        player.showBlocked('Actualización de contenido requerida. Conéctese a internet.');
                        return false;
                    }

                    if (cached.media_assets && cached.media_assets.length > 0) {
                        console.log(`📂 Restored ${cached.media_assets.length} assets from local cache (age: ${Math.round(age/60000)}m)`);
                        state.currentPlaylist = cached.media_assets;
                        state.lastSyncHash = cached.sync_hash;
                        return true;
                    }
                } catch (e) {
                    console.warn('⚠️ Cache restore failed:', e);
                }
                return false;
            },

            // ── PERSIST ──
            saveToCache(payload) {
                try {
                    localStorage.setItem(this.SYNC_CACHE_KEY, JSON.stringify({
                        ...payload,
                        savedAt: Date.now()
                    }));
                    console.log('💾 Playlist persisted to localStorage cache.');
                } catch (e) {
                    console.warn('⚠️ Failed to persist playlist:', e);
                }
            },

            // ── MAIN SYNC ──
            async performSync() {
                if (state.isSyncing) { console.log('⏳ Sync in progress, skipping.'); return; }

                if (!state.isOnline) {
                    console.log('⏸️ Offline — serving from local cache.');
                    // Try to restore cache; if expired → block
                    if (!this.restoreFromCache() && state.currentPlaylist.length === 0) {
                        player.showNoContent();
                    } else if (state.currentPlaylist.length > 0 && !player.isPlaying) {
                        player.play(state.currentPlaylist[state.currentIndex]);
                    }
                    return;
                }

                state.isSyncing = true;
                ui.updateStatus('sync');

                try {
                    console.log(`🔄 [DELTA SYNC] → ${CONFIG.SERVER_URL}`);

                    const syncResponse = await fetch(`${CONFIG.SERVER_URL}/api/device/sync`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            deviceId: state.deviceId,
                            lastHash: state.lastSyncHash || '',
                            batteryLevel: state.batteryLevel || 100,
                            lat: state.lat,
                            lng: state.lng
                        }),
                        signal: AbortSignal.timeout(15000) // 15s timeout
                    });

                    if (!syncResponse.ok) {
                        if (syncResponse.status === 402 || syncResponse.status === 403) {
                            console.warn('⛔ Payment required — kill-switch from server.');
                            player.showBlocked('Suscripción pendiente: RD$6,000.00');
                            return;
                        }
                        throw new Error(`HTTP ${syncResponse.status}`);
                    }

                    const syncData = await syncResponse.json();

                    // Server-side kill-switch
                    if (syncData.killSwitch || syncData.blocked) {
                        console.warn('⛔ Kill-switch active:', syncData.reason);
                        player.showBlocked(syncData.reason || 'Cuenta suspendida. Contacta a TAD.');
                        return;
                    }

                    // Delta check — no changes
                    if (syncData.update === false) {
                        console.log('✅ Delta sync: content is current (hash match).');
                        // Refresh TTL in cache so 24h clock resets
                        const existing = JSON.parse(localStorage.getItem(this.SYNC_CACHE_KEY) || '{}');
                        this.saveToCache({ ...existing, sync_hash: syncData.sync_hash });

                        // Resume playback if nothing is playing
                        if (state.currentPlaylist.length > 0 && !player.isPlaying) {
                            player.play(state.currentPlaylist[state.currentIndex]);
                        }

                    } else if (syncData.media_assets && syncData.media_assets.length > 0) {
                        console.log(`📥 New payload: ${syncData.media_assets.length} assets.`);

                        state.currentPlaylist = syncData.media_assets;
                        state.currentIndex = 0;
                        state.lastSyncHash  = syncData.sync_hash;
                        localStorage.setItem('tad_last_sync_hash', state.lastSyncHash);

                        // Persist to cache (offline resilience)
                        this.saveToCache({ media_assets: syncData.media_assets, sync_hash: syncData.sync_hash });

                        // Background pre-fetch into Cache API for true offline use
                        this._prefetchAssets(syncData.media_assets);

                        // Start playback immediately
                        player.play(state.currentPlaylist[0]);

                        window.dispatchEvent(new CustomEvent('TAD_UI_TOAST', {
                            detail: `✅ ${syncData.media_assets.length} campañas sincronizadas`
                        }));

                    } else {
                        // Empty playlist from server
                        console.warn('⚠️ Server returned empty media_assets.');

                        // Still try to serve from local cache
                        const restored = this.restoreFromCache();
                        if (restored && state.currentPlaylist.length > 0) {
                            console.log('📂 Serving stale cache while server has no content.');
                            if (!player.isPlaying) player.play(state.currentPlaylist[state.currentIndex]);
                        } else {
                            player.showNoContent();
                        }
                    }

                    // Execute remote commands (REBOOT, FORCE_SYNC, etc.)
                    if (syncData.commands?.length > 0) {
                        for (const cmd of syncData.commands) {
                            try { await this.executeRemoteCommand(cmd); } catch (e) {
                                console.error('❌ Command failed:', cmd.id, e);
                            }
                        }
                    }

                    await analytics.uploadAll();

                    state.lastSync = new Date().toISOString();
                    localStorage.setItem('tad_last_sync', state.lastSync);
                    this.syncRetryDelay = 30000; // Reset backoff on success

                    console.log('✅ Sync complete.');

                } catch (error) {
                    console.error('❌ Sync failed:', error);

                    // Graceful degradation: serve local cache instead of crashing
                    if (state.currentPlaylist.length === 0) {
                        const restored = this.restoreFromCache();
                        if (restored && state.currentPlaylist.length > 0) {
                            console.log('📂 Failure fallback: serving from local cache.');
                            player.play(state.currentPlaylist[0]);
                        } else {
                            player.showNoContent();
                        }
                    }

                    // Exponential backoff (max 10 min)
                    this.syncRetryDelay = Math.min(this.syncRetryDelay * 2, 10 * 60 * 1000);
                    console.log(`🔁 Retrying in ${this.syncRetryDelay / 1000}s`);
                    setTimeout(() => this.performSync(), this.syncRetryDelay);

                } finally {
                    state.isSyncing = false;
                    ui.updateStatus(state.isOnline ? 'online' : 'offline');
                }
            },

            // ── BACKGROUND PREFETCH ──
            async _prefetchAssets(assets) {
                if (!('caches' in window)) return;
                try {
                    const cache = await caches.open('tad-media-v1');
                    for (const asset of assets) {
                        const url = asset.url || asset.src;
                        if (!url) continue;
                        const existing = await cache.match(url);
                        if (!existing) {
                            cache.add(url).catch(() => console.warn('⚠️ Cache miss:', url));
                        }
                    }
                    console.log('📦 Background prefetch complete.');
                } catch (e) {
                    console.warn('⚠️ Prefetch error:', e);
                }
            },

            async executeRemoteCommand(command) {
                console.log('📡 Executing remote command:', command.type, command.params);
                let result = { success: true, timestamp: new Date().toISOString() };
                
                try {
                    switch (command.type) {
                        case 'REBOOT':
                            result.message = 'Rebooting app...';
                            await this.acknowledgeCommand(command.id, result);
                            location.reload();
                            return; // Stop here, reload will happen
                        case 'CLEAR_CACHE':
                            await this.clearCache();
                            result.message = 'Cache cleared successfully.';
                            break;
                        case 'FORCE_SYNC':
                            result.message = 'Forcing sync...';
                            await sync.performSync();
                            break;
                        case 'UPDATE_URL':
                            if (command.params.url) {
                                CONFIG.SERVER_URL = command.params.url;
                                localStorage.setItem('tad_server_url', CONFIG.SERVER_URL);
                                result.message = 'Server URL updated to ' + CONFIG.SERVER_URL;
                            } else {
                                throw new Error('Missing URL parameter');
                            }
                            break;
                        default:
                            result.success = false;
                            result.error = 'Unknown command type: ' + command.type;
                    }
                } catch (e) {
                    result.success = false;
                    result.error = e.message;
                }
                
                await this.acknowledgeCommand(command.id, result);
            },

            async acknowledgeCommand(id, result) {
                try {
                    await fetch(`${CONFIG.SERVER_URL}/api/device/command/${id}/ack`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(result)
                    });
                    console.log('✅ Command acknowledged:', id);
                } catch (e) {
                    console.error('Failed to ack command', id, e);
                }
            },
            
            async clearCache() {
                localStorage.clear();
                // We keep the device ID though!
                localStorage.setItem('tad_device_id', state.deviceId);
                console.log('🧹 Cache cleared (except Identity)');
            },
            
            async reboot() {
                location.reload();
            }
        };
        
        // ============================================
        // UI MANAGER
        // ============================================
        
        const ui = {
            init() {
                this.updateTime();
                setInterval(() => this.updateTime(), 1000);
                
                document.getElementById('device-id').textContent = state.deviceId;
                
                window.addEventListener('online', () => {
                    state.isOnline = true;
                    this.updateStatus('online');
                    console.log('🟢 Online');
                    // Auto-sync when coming back online
                    sync.performSync();
                });
                
                window.addEventListener('offline', () => {
                    state.isOnline = false;
                    this.updateStatus('offline');
                    console.log('🔴 Offline');
                });

                this.generateSyncQR();
                
                console.log('🎨 UI initialized');
            },

            generateSyncQR() {
                const qrContainer = document.getElementById('sync-qrcode');
                const nodeIdDisplay = document.getElementById('node-id-display');
                const nodeUrlDisplay = document.getElementById('node-public-url');
                
                if (nodeIdDisplay) nodeIdDisplay.textContent = state.deviceId;
                if (!qrContainer) return;
                
                qrContainer.innerHTML = '';
                
                // Producción Dashboard URL
                const PWA_URL = 'https://proyecto-ia-tad-dashboard.rewvid.easypanel.host/check-in';
                const syncUrl = `${PWA_URL}?deviceId=${state.deviceId}`;
                
                if (nodeUrlDisplay) nodeUrlDisplay.textContent = `NODO: ${state.deviceId}`;
                
                try {
                    new QRCode(qrContainer, {
                        text: syncUrl,
                        width: 160,
                        height: 160,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H
                    });
                    console.log('📱 Node QR generated for:', state.deviceId);
                } catch (e) {
                    console.error('❌ Error generando QR:', e);
                }
            },
            
            updateTime() {
                const now = new Date();
                const timeString = now.toLocaleTimeString('es-DO', { 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
                document.getElementById('time').textContent = timeString;
            },
            
            updateStatus(status) {
                const indicator = document.getElementById('status-indicator');
                const text = document.getElementById('status-text');
                
                indicator.className = 'status-dot';
                
                switch (status) {
                    case 'online':
                        indicator.classList.add('status-online');
                        text.textContent = 'Online';
                        break;
                    case 'offline':
                        indicator.classList.add('status-offline');
                        text.textContent = 'Offline';
                        break;
                    case 'sync':
                        indicator.classList.add('status-sync');
                        text.textContent = 'Syncing...';
                        break;
                }
            },
            
            updatePlaylistPosition() {
                const position = `${state.currentIndex + 1}/${state.currentPlaylist.length}`;
                document.getElementById('playlist-position').textContent = position;
            },
            
            updateProgress(progress) {
                // Optional: show progress bar
            },
            
            showHeaderFooter(show) {
                const header = document.getElementById('header');
                const footer = document.getElementById('footer');
                
                if (show) {
                    header.classList.remove('hidden');
                    footer.classList.remove('hidden');
                } else {
                    header.classList.add('hidden');
                    footer.classList.add('hidden');
                }
            }
        };
        
        // ============================================
        // WATCHDOG MONITOR
        // ============================================
        
        const watchdog = {
            lastActivity: Date.now(),
            checkInterval: null,
            
            init() {
                this.checkInterval = setInterval(() => this.check(), 60 * 1000);
                
                document.addEventListener('click', () => this.onActivity());
                document.addEventListener('keydown', () => this.onActivity());
                
                console.log('🐕 Watchdog initialized');
            },
            
            onActivity() {
                this.lastActivity = Date.now();
            },
            
            check() {
                const now = Date.now();
                const inactiveTime = now - this.lastActivity;
                
                if (inactiveTime > 10 * 60 * 1000) {
                    if (!player.isPlaying && state.currentPlaylist.length > 0) {
                        console.log('⚠️ Watchdog: Video not playing, restarting...');
                        player.retry();
                    }
                }
                
                if (now % CONFIG.HEARTBEAT_INTERVAL < 60000) {
                    this.sendHeartbeat();
                }
            },
            
            async sendHeartbeat() {
                if (!state.isOnline) return;
                
                // Get telemetry
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    state.batteryLevel = Math.floor(battery.level * 100);
                }

                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        state.lat = pos.coords.latitude;
                        state.lng = pos.coords.longitude;
                    }, null, { enableHighAccuracy: true });
                }

                // Simulator Mode fallback
                if (state.config.simulatorMode) {
                    // Simular ubicación en Santiago, RD para el piloto
                    state.lat = 19.4517 + (Math.random() - 0.5) * 0.01;
                    state.lng = -70.6970 + (Math.random() - 0.5) * 0.01;
                }
                
                try {
                    const response = await fetch(`${CONFIG.SERVER_URL}/api/device/heartbeat`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${state.authToken}`
                        },
                        body: JSON.stringify({
                            device_id: state.deviceId,
                            player_status: player.isPlaying ? 'playing' : 'idle',
                            battery_level: state.batteryLevel,
                            storage_free: 'N/A',
                            lat: state.lat,
                            lng: state.lng,
                            timestamp: new Date().toISOString()
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        if (data.blocked) {
                            console.warn('⛔ Heartbeat Block detected:', data.reason);
                            player.showBlocked(data.reason);
                        }
                    } else if (response.status === 402) {
                        player.showBlocked("Suscripción Pendiente: RD$6,000.00");
                    }

                } catch (error) {
                    console.error('❌ Heartbeat failed:', error);
                }
            }
        };
        
        // ============================================
        // INITIALIZATION — No Test Playlist!
        // ============================================
        
        async function init() {
            console.log('🚀 TAD Player v3.0 (SRE Grade) initializing...');
            
            // 1. Initialize storage + Device Identity
            await storage.init();
            
            // 2. Register with backend (so tablet appears in Fleet Monitor)
            if (state.isOnline) {
                try {
                    await fetch(`${CONFIG.SERVER_URL}/api/device/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            device_id: state.deviceId, 
                            app_version: 'v2.0.0-localhost' 
                        })
                    });
                    console.log('✅ Dispositivo Registrado en Backend:', state.deviceId);
                } catch (e) {
                    console.warn('⚠️ Registro en backend falló. Operando en modo ad-hoc.');
                }
            }
            
            // 3. Init UI + Player + Watchdog
            ui.init();
            player.init();
            if (state.config.watchdogEnabled) watchdog.init();

            // 4. OFFLINE-FIRST BOOT — restore local cache immediately
            const cacheRestored = sync.restoreFromCache();
            if (cacheRestored && state.currentPlaylist.length > 0) {
                console.log('📂 Boot: serving from local cache while connecting...');
                player.play(state.currentPlaylist[0]);
            } else {
                player.showNoContent();
            }

            // 5. Sync now if online; otherwise wait for connectivity
            if (state.isOnline) {
                try { await sync.performSync(); }
                catch (e) { console.warn('⚠️ Initial sync failed. Cached playlist active.'); }
            } else {
                console.log('📴 Device offline on boot. Serving cache until connectivity restored.');
            }

            // 6. Re-sync when device comes back online
            window.addEventListener('online', () => {
                state.isOnline = true;
                console.log('🌐 Online! Triggering re-sync...');
                sync.performSync();
            });
            window.addEventListener('offline', () => {
                state.isOnline = false;
                console.log('📴 Offline. Serving from local cache.');
                ui.updateStatus('offline');
            });

            // 7. Periodic sync (every SYNC_INTERVAL, default 5 min)
            setInterval(() => {
                if (!state.isOnline) return;
                const now = Date.now();
                const lastSyncTime = state.lastSync ? new Date(state.lastSync).getTime() : 0;
                if (now - lastSyncTime >= CONFIG.SYNC_INTERVAL) {
                    sync.performSync();
                }
            }, 60 * 1000);

            console.log('✅ TAD Player v3.0 (SRE Grade) ready.');
            console.log('📱 Device ID:', state.deviceId);
            console.log('🌐 Server:', CONFIG.SERVER_URL);
        }

        // Start app
        init().then(() => {
            setTimeout(() => {
                if (window.player) player.startExperience();
            }, 1000);
        });

        // Expose for debugging
        window.player = player;
        window.sync = sync;
        window.analytics = analytics;
    </script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then((registration) => {
                    console.log('[TAD CTO] PWA Service Worker registrado con éxito:', registration.scope);
                })
                .catch((error) => {
                    console.error('[TAD CTO] Fallo al registrar Service Worker:', error);
                });
        });
    }

    // Refactorización de tu lógica de descarga:
    // Ya NO necesitas convertir a Blob ni guardar en IndexedDB.
    // Simplemente asigna la URL del backend al <video src="..."> 
    // y el Service Worker se encargará de cachearlo automáticamente la primera vez que se reproduzca.
</script>

<script>
// ============================================
// TAD SYNC V5 — OFFLINE SYNC MANAGER
// ============================================
const CACHE_NAME = 'tad-media-v5';

class OfflineSyncManager {
  static async synchronize(deviceId) {
    try {
      console.log(`[TAD Sync] Iniciando sincronización para dispositivo: ${deviceId}`);
      
      const SERVER_URL = localStorage.getItem('tad_server_url') || 'https://api.tad.com.do';
      const response = await fetch(`${SERVER_URL}/api/sync/${deviceId}`);
      
      if (!response.ok) {
        if (response.status === 402) console.error('[TAD Sync] ⛔ Suscripción no pagada (Error 402).');
        if (response.status === 403) console.error('[TAD Sync] ⛔ Dispositivo Inactivo (Error 403).');
        return false;
      }
      
      const manifest = await response.json();
      const serverPlaylist = manifest.playlist;
      const serverUrls = serverPlaylist.map(item => item.url);

      const cache = await caches.open(CACHE_NAME);
      const cachedRequests = await cache.keys();
      const cachedUrls = cachedRequests.map(req => req.url);

      let hasChanges = false;

      for (const item of serverPlaylist) {
        if (!cachedUrls.includes(item.url)) {
          console.log(`[TAD Sync] ⬇️ Descargando nuevo medio: ${item.campaignId}`);
          try {
            await cache.add(item.url);
            hasChanges = true;
          } catch (err) {
            console.error(`[TAD Sync] Error descargando ${item.url}:`, err);
          }
        }
      }

      for (const cachedReq of cachedRequests) {
        if (!serverUrls.includes(cachedReq.url)) {
          console.log(`[TAD Sync] 🗑️ Eliminando medio obsoleto: ${cachedReq.url}`);
          await cache.delete(cachedReq);
          hasChanges = true;
        }
      }

      localStorage.setItem('tad_active_playlist', JSON.stringify(serverPlaylist));
      localStorage.setItem('tad_last_sync', new Date().toISOString());

      console.log(`[TAD Sync] ✅ Sincronización completada. Total videos activos: ${serverPlaylist.length}`);
      return hasChanges;

    } catch (error) {
      console.error('[TAD Sync] ❌ Fallo crítico en sincronización:', error);
      return false;
    }
  }
}

window.OfflineSyncManager = OfflineSyncManager;
</script>
