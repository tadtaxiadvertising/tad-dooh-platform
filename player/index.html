<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TAD DOOH Player</title>
    {/* Sentry Catch — Tablet Player */}
    <script src="https://js.sentry-cdn.com/b786a0fa94eec198afb9e35ce84d16ea.min.js" crossorigin="anonymous"></script>
    <script>
      Sentry.onLoad(function() {
        Sentry.init({
          dsn: "https://b786a0fa94eec198afb9e35ce84d16ea@o4511114332143616.ingest.us.sentry.io/4511114334633984",
          integrations: [Sentry.browserTracingIntegration()],
          tracesSampleRate: 1.0,
        });
      });
    </script>
    {/* Umami Analytics — Tablet Player */}
    <script async src="https://cloud.umami.is/script.js" data-website-id="f00863a7-7700-4e72-85ae-716f796edfc6"></script>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: black;
        overflow: hidden !important; /* TAREA KIOSK_002: Hard lock scroll */
        position: fixed; /* Prevenir bounce en iOS/Android WebView */
        touch-action: none; /* Bloquear gestos de sistema (deslizar para refrescar, zoom) */
        -webkit-user-select: none; /* Orden correcto para compatibilidad */
        user-select: none; /* Evitar que el pasajero seleccione texto */
      }
      #tad-player {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      #qr-container {
        position: fixed;
        bottom: 50px;
        right: 50px;
        width: 140px; 
        height: 140px;
        background: white;
        padding: 6px;
        border-radius: 12px;
        display: none; 
        z-index: 1000;
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        transition: opacity 0.5s ease;
      }
      #qr-container img {
        width: 100%;
        height: 100%;
      }
      .flex { display: flex; }
      .flex-col { flex-direction: column; }
      .items-center { align-items: center; }
      .justify-center { justify-content: center; }
      .text-center { text-align: center; }
      .w-full { width: 100%; }
      .h-full { height: 100%; }
      .mb-10 { margin-bottom: 2.5rem; }
      .mt-16 { margin-top: 4rem; }
      .p-12 { padding: 3rem; }
      .text-5xl { font-size: 3rem; }
      .text-2xl { font-size: 1.5rem; }
      .text-sm { font-size: 0.875rem; }
      .font-black { font-weight: 900; }
      .font-bold { font-weight: 700; }
      .uppercase { text-transform: uppercase; }
      .tracking-widest { letter-spacing: 0.1em; }
      .text-tad-yellow { color: #FFD400; }
      .bg-tad-yellow { background-color: #FFD400; }
      .text-white { color: #FFFFFF; }
      .text-gray-400 { color: #9CA3AF; }
      
      #intermission-screen {
        position: fixed;
        inset: 0;
        z-index: 2000;
        background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        display: none;
      }
      .intermission-content {
        animation: fadeIn 0.8s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      #qr-container.v-hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <!-- Main loop player, muted to bypass browser auto-play policies -->
    <video 
      id="tad-player" 
      autoplay 
      muted 
      playsinline 
      webkit-playsinline 
      disablepictureinpicture
      disableremoteplayback
    ></video>
    
    <!-- Transición de Anunciante (5s Intermission) -->
    <div id="intermission-screen">
      <div class="intermission-content flex flex-col items-center justify-center h-full w-full bg-gradient-to-br from-gray-900 to-black text-white p-12">
        <div class="mb-10 text-center">
          <p id="intermission-brand-label" class="text-tad-yellow text-sm font-black uppercase tracking-[0.5em] mb-4">Próximo Anuncio</p>
          <h2 id="intermission-advertiser-name" class="text-5xl font-black tracking-tighter uppercase leading-tight">Cargando...</h2>
        </div>

        <div class="relative group">
          <div class="absolute -inset-4 bg-tad-yellow/20 blur-2xl rounded-full group-hover:bg-tad-yellow/30 transition-all duration-1000"></div>
          <div class="relative bg-white p-10 rounded-[3rem] shadow-[0_20px_80px_rgba(0,0,0,0.8)] border border-white/10">
            <img id="intermission-qr" src="" alt="Menu QR" class="w-[350px] h-[350px]" />
          </div>
        </div>

        <div class="mt-16 text-center max-w-2xl">
          <h3 class="text-2xl font-bold mb-4">Escanea para conocer más</h3>
          <p class="text-gray-400 text-lg">Descubre nuestro menú, contáctanos por WhatsApp y síguenos en redes sociales.</p>
        </div>

        <div id="intermission-timer-bar" class="fixed bottom-0 left-0 h-2 bg-tad-yellow w-0 transition-all duration-[5000ms] ease-linear"></div>
      </div>
    </div>

    <!-- El antiguo QR overlay se mantiene oculto -->
    <div id="qr-container" class="v-hidden">
      <img id="qr-code" src="" alt="Scan" />
    </div>

    <!-- TAD UI Toast Container -->
    <div id="tad-toast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-rose-600/90 backdrop-blur-md text-white px-6 py-4 rounded-2xl shadow-[0_0_30px_rgba(225,29,72,0.4)] z-[9000] font-black uppercase text-[10px] tracking-[0.2em] transition-all duration-500 opacity-0 pointer-events-none scale-95 border-2 border-rose-400/50 flex items-center gap-3">
      <span id="tad-toast-msg">SISTEMA TAD</span>
    </div>

    <script>
      window.addEventListener('TAD_UI_TOAST', (e) => {
        const toast = document.getElementById('tad-toast');
        const msg = document.getElementById('tad-toast-msg');
        if (msg && toast) {
          msg.innerText = e.detail;
          toast.classList.remove('opacity-0', 'scale-95');
          toast.classList.add('opacity-100', 'scale-100');
          setTimeout(() => {
            toast.classList.remove('opacity-100', 'scale-100');
            toast.classList.add('opacity-0', 'scale-95');
          }, 8000);
        }
      });
    </script>
    
    <!-- Entry script loaded conditionally per Vite standard -->
    <script type="module" src="/index.ts"></script>
  </body>
</html>
